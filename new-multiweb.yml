AWSTemplateFormatVersion: "2010-09-09"
Description: "Custom VPC with Public and Private Subnets deploying multiple Apache2 Web Servers using loops."

# 1. Required to unlock the Fn::ForEach loop syntax
Transform: 'AWS::LanguageExtensions'

Resources:
  # ================= 1. VPC & INTERNET GATEWAY =================
  CustomVPC:
    Type: "AWS::EC2::VPC"
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: CFN-VPC

  InternetGateway:
    Type: "AWS::EC2::InternetGateway"
    Properties:
      Tags:
        - Key: Name
          Value: CFN-IGW

  VPCGatewayAttachment:
    Type: "AWS::EC2::VPCGatewayAttachment"
    Properties:
      VpcId: !Ref CustomVPC
      InternetGatewayId: !Ref InternetGateway

  # ================= 2. SUBNETS =================
  PublicSubnet:
    Type: "AWS::EC2::Subnet"
    Properties:
      VpcId: !Ref CustomVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: ap-south-1a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Public-Subnet-CFN

  PrivateSubnet:
    Type: "AWS::EC2::Subnet"
    Properties:
      VpcId: !Ref CustomVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: ap-south-1b
      Tags:
        - Key: Name
          Value: Private-Subnet-CFN

  # ================= 3. ROUTING =================
  PublicRouteTable:
    Type: "AWS::EC2::RouteTable"
    Properties:
      VpcId: !Ref CustomVPC
      Tags:
        - Key: Name
          Value: Public-Route-CFN

  PublicRoute:
    Type: "AWS::EC2::Route"
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: "AWS::EC2::SubnetRouteTableAssociation"
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: "AWS::EC2::RouteTable"
    Properties:
      VpcId: !Ref CustomVPC
      Tags:
        - Key: Name
          Value: Private-Route-CFN

  PrivateSubnetRouteTableAssociation:
    Type: "AWS::EC2::SubnetRouteTableAssociation"
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable   

  # ================= 4. SECURITY GROUP =================
  WebServerSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "Allow HTTP and SSH access"
      VpcId: !Ref CustomVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: "-1"
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0

  # ================= 5. DYNAMIC MULTI-VM GENERATOR =================
  'Fn::ForEach::WebServers':
    - Index              # Iterator variable
    - [ "1", "2" ]  # Defines the total number of VMs (3 instances). To add more, just add "4", "5", etc.
    - 'ApacheWebServer${Index}':
        Type: "AWS::EC2::Instance"
        Properties:
          InstanceType: t3.micro
          ImageId: ami-01a00762f46d584a1 
          SubnetId: !Ref PublicSubnet
          SecurityGroupIds:
            - !Ref WebServerSecurityGroup
          Tags:
            - Key: Name
              Value: !Sub "Apache-Public-Server-${Index}"
          UserData:
            Fn::Base64: !Sub |
              #!/bin/bash
              apt-get update -y
              apt-get install -y apache2
              systemctl start apache2
              systemctl enable apache2

              echo "<html>
              <head>
                <title>Welcome to Apache on Custom VPC</title>
              </head>
              <body>
                <h1>Apache2 Server #${Index} Successfully Deployed in Public Subnet!</h1>
              </body>
              </html>" > /var/www/html/index.html